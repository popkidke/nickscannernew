<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NICK-XMD | Link Device</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

  <style>
    :root {
      --ios-bg: #f2f2f7;
      --ios-blue: #007aff;
      --ios-card: rgba(255, 255, 255, 0.8);
      --ios-text: #000000;
      --ios-secondary: #8e8e93;
      --ios-gray: #e5e5ea;
      --blur: blur(25px);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: linear-gradient(135deg, #a2c2e6 0%, #d1e1f3 100%);
      color: var(--ios-text);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    /* Particles container - kept for tech vibe but subtle */
    #particles-js { 
      position: absolute; 
      width: 100%; 
      height: 100%; 
      z-index: 1; 
      opacity: 0.4;
    }

    /* iOS Glass Card */
    .container {
      width: 100%;
      max-width: 420px;
      padding: 40px 30px;
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
      background: var(--ios-card);
      border-radius: 45px; /* iOS Squircle vibe */
      border: 1px solid rgba(255, 255, 255, 0.4);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.1);
      z-index: 10;
      text-align: center;
    }

    .logo-container {
      width: 100px;
      height: 100px;
      margin: 0 auto 20px;
    }

    .logo-img {
      width: 100%;
      height: 100%;
      border-radius: 22px; /* iOS App Icon Radius */
      object-fit: cover;
      box-shadow: 0 8px 16px rgba(0,0,0,0.1);
    }

    .title {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 5px;
    }

    .tagline {
      font-size: 13px;
      color: var(--ios-secondary);
      font-weight: 500;
      margin-bottom: 30px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* Input Styling */
    .input-group {
      text-align: left;
      margin-bottom: 20px;
    }

    .input-label {
      display: block;
      margin-left: 5px;
      margin-bottom: 8px;
      font-size: 12px;
      color: var(--ios-secondary);
      font-weight: 600;
    }

    .input-field {
      width: 100%;
      padding: 16px;
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid var(--ios-gray);
      border-radius: 14px;
      color: var(--ios-text);
      font-size: 16px;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-field:focus {
      border-color: var(--ios-blue);
    }

    /* Buttons */
    .ios-btn-primary {
      width: 100%;
      padding: 16px;
      background: var(--ios-blue);
      color: #fff;
      border: none;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 15px;
      transition: opacity 0.2s, transform 0.1s;
    }

    .ios-btn-primary:active {
      opacity: 0.8;
      transform: scale(0.98);
    }

    /* Code Display Area */
    .code-display {
      min-height: 60px;
      padding: 15px;
      background: var(--ios-gray);
      border-radius: 14px;
      font-family: 'Courier New', Courier, monospace;
      font-weight: 700;
      font-size: 20px;
      color: var(--ios-blue);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 15px;
      letter-spacing: 2px;
    }

    .ios-btn-secondary {
      width: 100%;
      padding: 14px;
      background: transparent;
      border: 1px solid var(--ios-blue);
      border-radius: 14px;
      color: var(--ios-blue);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .ios-btn-secondary:active {
      background: rgba(0, 122, 255, 0.05);
    }

  </style>
</head>

<body>

<div id="particles-js"></div>

<div class="container">
  <div class="logo-container">
    <img src="https://files.catbox.moe/aapw1p.png" alt="Logo" class="logo-img">
  </div>

  <h1 class="title">NICK-XMD</h1>
  <div class="tagline">Link Your Device</div>

  <div class="input-group">
    <label class="input-label">PHONE NUMBER</label>
    <input type="text" id="mobileNumber" class="input-field" placeholder="+254...">
  </div>

  <button class="ios-btn-primary" id="submit">Generate Link Code</button>

  <div class="code-display" id="codeDisplay">- - - - - -</div>

  <button class="ios-btn-secondary" id="copy">
    <i class="fas fa-copy"></i> Copy Code
  </button>
</div>

<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.6.0/axios.min.js"></script>

<script>
  // Subtle particle background
  particlesJS("particles-js", {
    particles: {
      number: { value: 40, density: { enable: true, area: 800 } },
      color: { value: "#007aff" },
      shape: { type: "circle" },
      opacity: { value: 0.2, random: true },
      size: { value: 3, random: true },
      move: { enable: true, speed: 0.8 }
    }
  });

  // Functionality (Untouched)
  document.getElementById('submit').addEventListener('click', async () => {
    const codeDisplay = document.getElementById('codeDisplay');
    const num = document.getElementById('mobileNumber').value.trim();
    if (!num) {
      codeDisplay.textContent = 'Invalid Number';
      return;
    }

    codeDisplay.textContent = 'Connecting...';

    try {
      const res = await axios(`/code?number=${num.replace(/\D/g, '')}`);
      codeDisplay.textContent = res.data.code || 'Error';
    } catch {
      codeDisplay.textContent = 'Failed';
    }
  });

  document.getElementById('copy').addEventListener('click', () => {
    const code = document.getElementById('codeDisplay').textContent.trim();
    if (!code || code === '- - - - - -' || code === 'Connecting...') return;

    navigator.clipboard.writeText(code);
    // iOS feedback feel: we can change button text briefly
    const copyBtn = document.getElementById('copy');
    const originalText = copyBtn.innerHTML;
    copyBtn.innerHTML = '<i class="fas fa-check"></i> Copied';
    setTimeout(() => { copyBtn.innerHTML = originalText; }, 2000);
  });
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NICK-XMD | iOS Edition</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --ios-bg: #f2f2f7;
            --ios-card: rgba(255, 255, 255, 0.7);
            --ios-blue: #007aff;
            --ios-text: #000000;
            --ios-secondary: #8e8e93;
            --ios-blur: blur(20px);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #a2c2e6 0%, #d1e1f3 100%);
            background-attachment: fixed;
            color: var(--ios-text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Glassmorphism Wrapper */
        .iphone-container {
            width: 100%;
            max-width: 500px;
            background: var(--ios-card);
            backdrop-filter: var(--ios-blur);
            -webkit-backdrop-filter: var(--ios-blur);
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
            padding-bottom: 30px;
        }

        /* Header Styling */
        .ios-header {
            padding: 40px 20px 20px;
            text-align: center;
        }

        .logo-container {
            position: relative;
            display: inline-block;
            margin-bottom: 15px;
        }

        .logo-img {
            width: 110px;
            height: 110px;
            border-radius: 25px; /* iOS Icon Squircle */
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            object-fit: cover;
        }

        .ios-header h1 {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .ios-header span {
            color: var(--ios-secondary);
            font-size: 0.9rem;
            font-weight: 500;
        }

        /* Menu Buttons */
        .ios-menu {
            padding: 10px 20px;
        }

        .ios-btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.8);
            margin-bottom: 10px;
            padding: 16px 20px;
            border-radius: 15px;
            text-decoration: none;
            color: var(--ios-text);
            font-weight: 500;
            transition: all 0.2s ease;
            border: 1px solid rgba(0,0,0,0.05);
        }

        .ios-btn:active {
            background: #e5e5ea;
            transform: scale(0.98);
        }

        .ios-btn i {
            color: var(--ios-blue);
            font-size: 1.2rem;
            width: 30px;
        }

        .btn-chevron {
            color: #c7c7cc;
            font-size: 0.9rem;
        }

        /* Feedback Section */
        .ios-feedback {
            margin: 20px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 20px;
            padding: 20px;
        }

        .ios-input, .ios-textarea {
            width: 100%;
            border: none;
            background: #f2f2f7;
            padding: 12px 15px;
            border-radius: 10px;
            margin-bottom: 10px;
            font-size: 15px;
            outline: none;
        }

        .ios-textarea {
            height: 80px;
            resize: none;
        }

        .ios-submit {
            width: 100%;
            background: var(--ios-blue);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
        }

        /* Comment List */
        .comment-list {
            margin-top: 20px;
            max-height: 250px;
            overflow-y: auto;
        }

        .user-comment-box {
            background: white;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 10px;
            font-size: 14px;
            position: relative;
        }

        .comment-author {
            font-weight: 700;
            color: var(--ios-blue);
            margin-bottom: 2px;
        }

        .comment-time {
            font-size: 11px;
            color: var(--ios-secondary);
            margin-bottom: 5px;
        }

        .remove-comment {
            position: absolute;
            top: 10px;
            right: 10px;
            border: none;
            background: #ff3b30;
            color: white;
            font-size: 10px;
            padding: 4px 8px;
            border-radius: 5px;
            cursor: pointer;
        }

        footer {
            text-align: center;
            color: var(--ios-secondary);
            font-size: 12px;
            margin-top: 20px;
        }

        /* Scrollbar styling for iOS feel */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #d1d1d6; border-radius: 10px; }

    </style>
</head>
<body>

    <div class="iphone-container">
        <header class="ios-header">
            <div class="logo-container">
                <img src="https://files.catbox.moe/aapw1p.png" alt="LOGO" class="logo-img">
            </div>
            <h1>NICK-XMD</h1>
            <span>Kenyan Top WhatsApp Bot</span>
        </header>

        <nav class="ios-menu">
            <a href="/pair" class="ios-btn">
                <span><i class="fas fa-link"></i> Pair Code</span>
                <i class="fas fa-chevron-right btn-chevron"></i>
            </a>
            <a href="/qr" class="ios-btn">
                <span><i class="fas fa-qrcode"></i> QR Code</span>
                <i class="fas fa-chevron-right btn-chevron"></i>
            </a>
            <a href="https://wa.me/254111385747" target="_blank" class="ios-btn">
                <span><i class="fas fa-headset"></i> Reach Owner</span>
                <i class="fas fa-chevron-right btn-chevron"></i>
            </a>
            <a href="https://github.com/popkidc" target="_blank" class="ios-btn">
                <span><i class="fab fa-github"></i> GitHub Repo</span>
                <i class="fas fa-chevron-right btn-chevron"></i>
            </a>
            <a href="https://dashboard.heroku.com/new?template=https://github.com/popkidc/POPKID-XD" target="_blank" class="ios-btn">
                <span><i class="fas fa-cloud-upload-alt"></i> Heroku Deploy</span>
                <i class="fas fa-chevron-right btn-chevron"></i>
            </a>
        </nav>

        <section class="ios-feedback">
            <input type="text" class="ios-input user-name" placeholder="Your Name">
            <textarea class="ios-textarea user-comment" placeholder="Leave your feedback..."></textarea>
            <button class="ios-submit post-comment">Post Feedback</button>

            <div class="comment-list" id="comment-list">
                </div>
        </section>

        <footer>
            © POPKID-XMD 2026
        </footer>
    </div>

    <script>
        function showComments() {
            const savedComments = JSON.parse(localStorage.getItem('userFeedback')) || [];
            const commentArea = document.getElementById('comment-list');
            commentArea.innerHTML = '';
            
            savedComments.forEach((feedback, index) => {
                const newFeedback = document.createElement('div');
                newFeedback.className = 'user-comment-box';
                newFeedback.innerHTML = `
                    <div class="comment-author">${feedback.name}</div>
                    <div class="comment-time">${feedback.time}</div>
                    <p>${feedback.text}</p>
                    <button class="remove-comment" onclick="deleteComment(${index})">Delete</button>
                `;
                commentArea.appendChild(newFeedback);
            });
        }

        // Maintain original logic but fixed for clean execution
        document.querySelector('.post-comment').addEventListener('click', function() {
            const nameInput = document.querySelector('.user-name');
            const commentInput = document.querySelector('.user-comment');
            
            if (nameInput.value && commentInput.value) {
                const newFeedback = {
                    name: nameInput.value,
                    text: commentInput.value,
                    time: new Date().toLocaleString('en-GB')
                };
                let feedbackList = JSON.parse(localStorage.getItem('userFeedback')) || [];
                feedbackList.unshift(newFeedback); // Newest first
                localStorage.setItem('userFeedback', JSON.stringify(feedbackList));
                
                nameInput.value = '';
                commentInput.value = '';
                showComments();
            }
        });

        function deleteComment(index) {
            let feedbackList = JSON.parse(localStorage.getItem('userFeedback')) || [];
            feedbackList.splice(index, 1);
            localStorage.setItem('userFeedback', JSON.stringify(feedbackList));
            showComments();
        }

        window.onload = showComments;
    </script>
</body>
</html>
